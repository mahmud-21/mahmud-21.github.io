    <main id="main">

        <!-- ── About ── -->
        <section class="section" id="overview">
            <div class="container">
                <h2 class="section-title">Overview</h2>

                <!-- SDG Icons -->
                <div class="sdg-strip">
                    <span class="sdg-strip-label">SDG Alignment:</span>
                    <a class="sdg-icon" href="https://sdgs.un.org/goals/goal3" target="_blank" rel="noreferrer" title="SDG 3 - Good Health and Well-being">
                        <img src="https://sdg.mbstu.ac.bd/images/3.jpeg" alt="SDG 3 Good Health" class="sdg-img">
                    </a>
                    <a class="sdg-icon" href="https://sdgs.un.org/goals/goal4" target="_blank" rel="noreferrer" title="SDG 4 - Quality Education">
                        <img src="https://sdg.mbstu.ac.bd/images/4.jpeg" alt="SDG 4 Quality Education" class="sdg-img">
                    </a>
                    <a class="sdg-icon" href="https://sdgs.un.org/goals/goal5" target="_blank" rel="noreferrer" title="SDG 5 - Gender Equality">
                        <img src="https://sdg.mbstu.ac.bd/images/5.jpeg" alt="SDG 5 Gender Equality" class="sdg-img">
                    </a>
                    <a class="sdg-icon" href="https://sdgs.un.org/goals/goal9" target="_blank" rel="noreferrer" title="SDG 9 - Industry, Innovation and Infrastructure">
                        <img src="https://sdg.mbstu.ac.bd/images/9.jpeg" alt="SDG 9 Industry Innovation" class="sdg-img">
                    </a>
                    <a class="sdg-icon" href="https://sdgs.un.org/goals/goal10" target="_blank" rel="noreferrer" title="SDG 10 - Reduced Inequalities">
                        <img src="https://sdg.mbstu.ac.bd/images/17.jpeg" alt="SDG 10 Reduced Inequalities" class="sdg-img">
                    </a>
                </div>
                <div class="about-layout">
                    <div class="section-content">
                        <p>Prof. Dr. Ziaur Rahman is an academic, researcher, and software development professional with over 12 years of experience in higher education, research, and industry-oriented technology development. He currently serves as a <strong>Full Professor</strong> at the Department of Information and Communication Technology (ICT), <strong>Mawlana Bhashani Science and Technology University (MBSTU)</strong>, Bangladesh. In addition to his academic responsibilities, he serves as the <strong>Director of the Cyber Security Center</strong>, the <strong>Secretary and Primary Research Contact of the Quality Review and Ranking Committee (QRRC)</strong>, and the <strong>Student Advisor</strong> of the Department of ICT at MBSTU.</p>
                        <p>As a course coordinator, Prof. Rahman designs and delivers courses in computer programming, software engineering, and cybersecurity. His research interests encompass privacy-preserving IoT security, blockchain technology, edge machine learning, and software security, with a strong focus on developing secure, scalable, and efficient solutions for emerging Industry 4.0 challenges.</p>
                        <p>Prof. Rahman earned his <strong>PhD in Cybersecurity</strong> from <a href="https://www.rmit.edu.au" target="_blank">RMIT University</a>, Australia, where he received the prestigious Higher Degree by Research Award and his doctoral thesis was recognized as outstanding, placing it among the <strong>top 5% of submissions</strong>. Following his doctoral studies, he served as a <strong>Postdoctoral Research Fellow</strong> in Cybersecurity at <a href="https://www.qut.edu.au" target="_blank">Queensland University of Technology (QUT)</a> and <a href="https://www.csu.edu.au" target="_blank">Charles Sturt University (CSU)</a>, Australia.</p>
                        <p>Passionate about bridging academia and industry, Prof. Rahman is an enthusiastic lifelong learner who has completed several professional certifications and advanced training programs, including <strong>Infosec Certified Cloud Security Professional (CCSP)</strong>, IBM Penetration Testing, Threat Hunting, Cryptography and Security, AWS Compliance, and Governance for AI Solutions.</p>
                        <p>Together with his research collaborators, Prof. Rahman has published extensively in leading international journals and conferences. He maintains active professional affiliations with the <a href="https://www.acm.org" target="_blank">Association for Computing Machinery (ACM)</a>, <a href="https://www.acs.org.au" target="_blank">Australian Computer Society (ACS)</a>, <a href="https://www.aisa.org.au" target="_blank">Australian Information Security Association (AISA)</a>, Institution of Engineers Bangladesh (IEB), and <a href="https://www.ieee.org" target="_blank">Institute of Electrical and Electronics Engineers (IEEE)</a>. He also serves as the <strong>Convener of the BASIS Student Forum</strong>, Bangladesh.</p>
                        <p>Prof. Rahman is the <strong>Founding Chair of the Systems Security and Innovation (SSI) Lab</strong> at MBSTU, a research hub focused on advancing cybersecurity, software systems, and emerging digital technologies.</p>
                        <p>As a Lead Organizer, Prof. Rahman is serving as the <strong>Secretary of the Technical Program Committee (TPC)</strong> of the <strong>IEEE International Conference on Engineering and Frontier Technologies (ICEFronT) 2026</strong>. He has also contributed as a Program Committee Member for various international conferences, an Associate Editor of a JCR Q1-ranked journal, and a reviewer for several top-tier journals.</p>
