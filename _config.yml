                    function renderGrid() {
                        var slice = articles.slice((page-1)*PER_PAGE, page*PER_PAGE);
                        document.getElementById('nc-grid').innerHTML = slice.map(function(a) {
                            return '<article class="nc-card"><div class="nc-thumb"><img src="'+faviconURL(a.domain)+'" alt="" onerror="this.style.display=\'none\'"><span class="nc-source">'+a.source+'</span></div><div class="nc-body"><div class="nc-title-en">'+a.en+'</div><div class="nc-title-bn">'+a.bn+'</div><a class="nc-read" href="'+a.url+'" target="_blank" rel="noopener noreferrer">Read Article '+arrowSVG()+'</a></div></article>';
