    <script>
        /* Mobile menu toggle */
        const toggle = document.querySelector('.mobile-menu-toggle');
        const menu   = document.querySelector('.nav-menu');
        toggle.addEventListener('click', () => {
            const expanded = toggle.getAttribute('aria-expanded') === 'true';
            toggle.setAttribute('aria-expanded', String(!expanded));
            menu.classList.toggle('open');
        });

        /* Dropdown submenu toggle (mobile/touch) */
        document.querySelectorAll('.nav-menu > li.has-dropdown > .dropdown-toggle').forEach((toggleLink) => {
            toggleLink.addEventListener('click', (e) => {
                if (window.matchMedia('(max-width: 720px)').matches) {
                    e.preventDefault();
                    const li = toggleLink.closest('li.has-dropdown');
                    const wasOpen = li.classList.contains('open');
                    document.querySelectorAll('.nav-menu > li.has-dropdown').forEach(l => l.classList.remove('open'));
                    if (!wasOpen) li.classList.add('open');
                }
            });
        });

        /* Primary nav active highlight on scroll */
        const navLinks = document.querySelectorAll('.nav-menu a[href^="#"]');
        const navSections = [...navLinks].map(a => document.querySelector(a.getAttribute('href')));
        const activateNav = () => {
            const scrollY = window.scrollY + 160;
            navSections.forEach((s, i) => {
                if (!s) return;
                if (s.offsetTop <= scrollY && s.offsetTop + s.offsetHeight > scrollY) {
                    navLinks.forEach(l => l.classList.remove('active'));
                    navLinks[i].classList.add('active');
                }
            });
        };
        window.addEventListener('scroll', activateNav, { passive: true });
        activateNav();

        /* Contact form submission */
        const contactForm = document.getElementById('contact-form');
        if (contactForm) {
            contactForm.addEventListener('submit', async (e) => {
                e.preventDefault();
                const note = document.getElementById('contact-form-note');
                const btn = contactForm.querySelector('.contact-submit');
                note.className = 'contact-form-note';
                note.textContent = 'Sending…';
                btn.disabled = true;
                try {
                    const res = await fetch(contactForm.action, {
                        method: 'POST',
                        headers: { 'Accept': 'application/json' },
                        body: new FormData(contactForm)
                    });
                    if (res.ok) {
                        note.textContent = 'Thank you — your message has been sent.';
                        note.className = 'contact-form-note success';
                        contactForm.reset();
                    } else {
                        throw new Error('Request failed');
                    }
                } catch (err) {
                    note.textContent = 'Something went wrong. Please email zia@mbstu.ac.bd directly.';
                    note.className = 'contact-form-note error';
                } finally {
                    btn.disabled = false;
                }
            });
        }

        /* Teaching course filter */
        function filterCourses(inst, btn) {
            document.querySelectorAll('.tf-btn').forEach(b => b.classList.remove('tf-active'));
            btn.classList.add('tf-active');
            document.querySelectorAll('.course-card').forEach(card => {
                card.style.display = (inst === 'all' || card.dataset.inst === inst) ? '' : 'none';
            });
        }

        /* Publications tab switcher */
        function switchPub(id, btn) {
            document.querySelectorAll('.pub-pane').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.pub-tab').forEach(el => el.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            btn.classList.add('active');
        }
    </script>
