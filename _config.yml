                    <article class="info-card">
                        <h3>CRAST</h3>
                        <p>Cross-Registry Anomalous SysCall Tracing for NPM and PyPI Ecosystems — syscall-level threat detection across open-source registries.</p>
                    </article>
                    <article class="info-card">
                        <h3>LLM-Enabled SQL Injection Detection</h3>
                        <p>Leveraging large language models for SQL injection detection and personalised user-facing remediation recommendations.</p>
                    </article>
                    <article class="info-card">
                        <h3>HTTP Security Headers</h3>
                        <p>Machine learning-based detection of misconfigured HTTP security headers paired with LLM-driven recovery guidance.</p>
                    </article>
