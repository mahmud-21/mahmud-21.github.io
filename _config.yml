<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Professor Dr. Ziaur Rahman, Chair SSI Lab and Director Cyber Center, Mawlana Bhashani Science and Technology University, Bangladesh.">
    <meta name="author" content="Ziaur Rahman">
    <meta name="theme-color" content="#6B1A18">
    <title>Ziaur Rahman @ MBSTU</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=Source+Sans+3:wght@400;500;600;700&display=swap">

    <style>
        /* ── Reset & Base ── */
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --banner-bg:    #9B2E2B;
            --bar-bg:       #5A1310;
            --bar-hover:    #7A1E1B;
            --accent:       #C8A96E;
            --accent-light: #EDD9A3;
            --gold:         #8a5e1a;
            --gold-dim:     #b87d28;
            --text:         #1a1a1a;
            --text-muted:   #555;
            --border:       #e0d6d0;
            --border2:      #D8D2CE;
            --bg-soft:      #faf8f6;
            --card-bg:      #fff;
            --radius:       6px;
            --shadow:       0 2px 12px rgba(0,0,0,0.09);
            --ff-display:   'Fraunces', Georgia, serif;
            --ff-body:      'Source Sans 3', system-ui, sans-serif;
            --ff-mono:      'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace;
        }
        html { scroll-behavior: smooth; }
        body {
            font-family: var(--ff-body);
            font-size: 16px;
            line-height: 1.7;
            color: var(--text);
            background: #fff;
        }
        a { color: var(--banner-bg); text-decoration: none; }
        a:hover { text-decoration: underline; }
        img { display: block; max-width: 100%; }
        ul { list-style: none; }

        /* ── Layout ── */
        .container { max-width: 1080px; margin: 0 auto; padding: 0 24px; }

        /* ── Skip link ── */
        .skip-link {
            position: absolute; top: -40px; left: 0;
            background: var(--bar-bg); color: #fff;
            padding: 8px 16px; z-index: 999;
        }
        .skip-link:focus { top: 0; }

        /* ════════════════════════════════════════
           HEADER
        ════════════════════════════════════════ */
        .site-header { position: sticky; top: 0; z-index: 100; }

        .brand-bar {
            background: var(--banner-bg);
            border-bottom: 3px solid rgba(0,0,0,0.15);
        }
        .brand-bar .container {
            display: flex; align-items: center;
            justify-content: space-between; height: 52px;
        }
        .brand-unit {
            font-family: var(--ff-body); font-size: 13px; font-weight: 600;
            color: rgba(255,255,255,0.90); letter-spacing: 0.04em; text-transform: uppercase;
        }
        .brand-logo { height: 36px; width: auto; object-fit: contain; }

        .navbar { background: var(--bar-bg); }
        .nav-container {
            max-width: 1080px; margin: 0 auto; padding: 0 24px;
            display: flex; align-items: center; justify-content: space-between; height: 50px;
        }
        .nav-logo { display: flex; align-items: center; gap: 8px; }
        .nav-logo-name {
            font-family: var(--ff-display); font-size: 18px; font-weight: 600; color: #fff;
        }
        .nav-menu { display: flex; gap: 4px; align-items: center; flex-wrap: wrap; }
        .nav-menu > li { position: relative; }
        .nav-menu a {
            font-size: 12.5px; font-weight: 600; color: rgba(255,255,255,0.85);
            padding: 5px 10px; border-radius: var(--radius);
            transition: background 0.2s, color 0.2s; letter-spacing: 0.02em;
        }
        .nav-menu a:hover { background: var(--bar-hover); color: #fff; text-decoration: none; }
        .nav-menu a.active { background: var(--bar-hover); color: #fff; }

        /* Dropdown submenus */
        .nav-menu .dropdown-toggle {
            display: inline-flex; align-items: center; gap: 4px; cursor: pointer;
        }
        .nav-menu .dropdown-toggle .caret {
            width: 8px; height: 8px; transition: transform 0.2s;
        }
        .nav-menu > li.has-dropdown.open .dropdown-toggle .caret { transform: rotate(180deg); }
        .dropdown-menu {
            list-style: none; margin: 0; padding: 6px;
            position: absolute; top: calc(100% + 6px); left: 0; min-width: 200px;
            background: var(--bar-bg); border: 1px solid rgba(255,255,255,0.12);
            border-radius: var(--radius); box-shadow: 0 10px 28px rgba(0,0,0,0.3);
            opacity: 0; visibility: hidden; transform: translateY(-6px);
            transition: opacity 0.18s, transform 0.18s, visibility 0.18s;
            z-index: 150;
        }
        .nav-menu > li.has-dropdown:hover .dropdown-menu,
        .nav-menu > li.has-dropdown.open .dropdown-menu {
            opacity: 1; visibility: visible; transform: translateY(0);
        }
        .dropdown-menu li { width: 100%; }
        .dropdown-menu a {
            display: block; padding: 8px 12px; font-size: 12.5px;
            white-space: nowrap; border-radius: 4px;
        }
        .mobile-menu-toggle {
            display: none; flex-direction: column; gap: 5px;
            background: none; border: none; cursor: pointer; padding: 6px;
        }
        .mobile-menu-toggle span {
            display: block; width: 24px; height: 2px;
            background: rgba(255,255,255,0.85); transition: all 0.3s;
        }

        /* ════════════════════════════════════════
           HERO
        ════════════════════════════════════════ */
        .hero {
            background:
                linear-gradient(135deg, rgba(90,19,16,0.88) 0%, rgba(155,46,43,0.82) 60%, rgba(90,19,16,0.70) 100%),
                url('https://raw.githubusercontent.com/rahmanziaur/rahmanziaur.github.io/main/Asset/cyber.jfif')
                center / cover no-repeat;
            color: #fff; padding: 64px 0 56px;
        }
        .hero-content { display: flex; align-items: center; gap: 48px; }
        .hero-text { flex: 1 1 0; }
        .hero-text h1 {
            font-family: var(--ff-display);
            font-size: clamp(28px, 5vw, 44px); font-weight: 600;
            line-height: 1.15; color: #fff; margin-bottom: 10px;
        }
        .hero-text .title {
            font-size: 15px; font-weight: 600; color: var(--accent-light);
            letter-spacing: 0.04em; text-transform: uppercase; margin-bottom: 14px;
        }
        .hero-text .affiliation {
            font-size: 15px; line-height: 1.8;
            color: rgba(255,255,255,0.88); margin-bottom: 14px;
        }
        .hero-text .affiliation a { color: var(--accent-light); }
        .hero-text .affiliation a:hover { color: #fff; }
        .hero-text .email { font-size: 14px; color: rgba(255,255,255,0.75); margin-bottom: 26px; }
        .hero-links { display: flex; flex-wrap: wrap; gap: 10px; }
        .button-link {
            display: inline-block; padding: 9px 20px; border-radius: var(--radius);
            font-size: 14px; font-weight: 600; transition: all 0.2s; letter-spacing: 0.02em;
        }
        .button-link.primary { background: var(--accent); color: #2a0c0b; }
        .button-link.primary:hover { background: var(--accent-light); text-decoration: none; }
        .button-link.secondary {
            background: rgba(255,255,255,0.14); color: #fff;
            border: 1px solid rgba(255,255,255,0.35);
        }
        .button-link.secondary:hover { background: rgba(255,255,255,0.25); text-decoration: none; }

        .hero-image { flex: 0 0 auto; }
        .profile-card {
            width: 260px; height: 280px; border-radius: 8px; overflow: hidden;
            border: 4px solid rgba(200,169,110,0.55); box-shadow: 0 8px 32px rgba(0,0,0,0.35);
        }
        .profile-card img { width: 100%; height: 100%; object-fit: cover; object-position: top center; }

        /* Designation list in hero */
        .hero-designations { margin-bottom: 14px; }
        .designation-list {
            list-style: none; padding: 0; margin: 0;
            display: flex; flex-direction: column; gap: 6px;
        }
        .designation-list li {
            font-size: 14px; color: rgba(255,255,255,0.88);
            padding-left: 20px; position: relative; line-height: 1.55;
        }
        .designation-list li::before {
            content: '▸'; position: absolute; left: 0; top: 0;
            color: var(--accent); font-size: 12px; line-height: 1.6;
        }
        .designation-list li a { color: var(--accent-light); }
        .designation-list li a:hover { color: #fff; }

        /* SDG icons strip */
        .sdg-strip {
            display: flex; flex-wrap: wrap; gap: 10px; align-items: center;
            margin-bottom: 28px; padding: 14px 18px;
            background: var(--bg-soft); border: 1px solid var(--border);
            border-radius: var(--radius);
        }
        .sdg-strip-label {
            font-family: var(--ff-mono); font-size: 11px; color: var(--text-muted);
            letter-spacing: 0.08em; text-transform: uppercase; margin-right: 2px;
        }
        .sdg-icon {
            display: inline-flex; align-items: center;
            text-decoration: none; transition: transform 0.18s, opacity 0.18s;
            border-radius: 4px; overflow: hidden;
            box-shadow: 0 1px 4px rgba(0,0,0,0.15);
        }
        .sdg-icon:hover { transform: scale(1.10); opacity: 0.92; text-decoration: none; box-shadow: 0 3px 10px rgba(0,0,0,0.22); }
        .sdg-img {
            width: 52px; height: 52px; object-fit: cover;
            display: block;
        }

        /* Resume embed section */
        .resume-embed-wrap {
            width: 100%; border-radius: var(--radius); overflow: hidden;
            border: 1px solid var(--border); box-shadow: var(--shadow);
            background: #525659;
        }
        .resume-embed-toolbar {
            display: flex; align-items: center; justify-content: space-between;
            background: #3d3d3d; padding: 10px 16px; gap: 12px;
        }
        .resume-embed-toolbar span {
            font-family: var(--ff-mono); font-size: 12px; color: rgba(255,255,255,0.75);
        }
        .resume-embed-toolbar a {
            font-size: 13px; font-weight: 600; color: var(--accent-light);
            display: inline-flex; align-items: center; gap: 5px;
            padding: 5px 14px; border-radius: 4px;
            background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2);
            transition: background 0.2s;
        }
        .resume-embed-toolbar a:hover { background: rgba(255,255,255,0.2); text-decoration: none; }
        .resume-embed-wrap iframe {
            width: 100%; height: 820px; border: none; display: block;
        }

        /* hero section quick-nav tabs */
        .hero-section-tabs {
            display: flex; flex-wrap: wrap; gap: 6px; margin: 14px 0 4px;
        }
        .hero-tab {
            font-size: 12px; font-weight: 600; letter-spacing: 0.04em;
            color: rgba(255,255,255,0.75);
            padding: 4px 12px; border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.25);
            background: rgba(255,255,255,0.08);
            transition: background 0.2s, color 0.2s, border-color 0.2s;
        }
        .hero-tab:hover { background: rgba(255,255,255,0.2); color: #fff; border-color: rgba(255,255,255,0.5); text-decoration: none; }

        /* badge strip */
        .badge-strip { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 20px; }
        .badge {
            background: rgba(255,255,255,0.12); border: 1px solid rgba(255,255,255,0.3);
            color: rgba(255,255,255,0.88); font-family: var(--ff-mono); font-size: 11px;
            padding: 4px 10px; border-radius: 3px; letter-spacing: 0.04em;
        }

        /* ════════════════════════════════════════
           SECTIONS
        ════════════════════════════════════════ */
        .section { padding: 56px 0; border-bottom: 1px solid var(--border); scroll-margin-top: 110px; }
        .section:last-child { border-bottom: none; }
        .section:nth-child(even) { background: var(--bg-soft); }

        .section-title {
            font-family: var(--ff-display); font-size: 26px; font-weight: 600;
            color: var(--banner-bg); margin-bottom: 20px; padding-bottom: 10px;
            border-bottom: 2px solid var(--banner-bg); display: inline-block;
        }
        .section-content p { margin-bottom: 14px; }
        .section-content p:last-child { margin-bottom: 0; }

        .subsection-title {
            font-family: var(--ff-display); font-size: 19px; font-weight: 600;
            color: var(--banner-bg); margin: 40px 0 16px;
            padding-top: 28px; border-top: 1px solid var(--border);
            scroll-margin-top: 110px;
        }
        .about-layout + .subsection-title,
        .key-focus-grid + .subsection-title { margin-top: 40px; }

        /* ── Research Interest Tags ── */
        .ri-tags { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 10px; }
        .ri-tag {
            background: var(--bg-soft); border: 1px solid var(--border2);
            color: var(--banner-bg); font-family: var(--ff-mono); font-size: 12px;
            padding: 5px 14px; border-radius: 3px; letter-spacing: 0.04em;
            text-decoration: none; transition: background 0.2s, border-color 0.2s;
        }
        .ri-tag:hover { background: rgba(155,46,43,0.08); border-color: var(--banner-bg); text-decoration: none; }

        /* ── Research Theme Cards ── */
        .key-focus-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 20px; margin-top: 24px;
        }
        .info-card {
            background: var(--card-bg); border: 1px solid var(--border);
            border-left: 4px solid var(--banner-bg); border-radius: var(--radius);
            padding: 20px; box-shadow: var(--shadow); transition: box-shadow 0.2s, transform 0.2s;
        }
        .info-card:hover { box-shadow: 0 6px 24px rgba(155,46,43,0.13); transform: translateY(-2px); }
        .info-card h3 {
            font-family: var(--ff-display); font-size: 15px; font-weight: 600;
            color: var(--banner-bg); margin-bottom: 8px;
        }
        .info-card p { font-size: 14px; color: var(--text-muted); }

        /* ── Profile Links Card (sidebar) ── */
        .profile-links-card {
            background: var(--card-bg); border: 1px solid var(--border2);
            border-top: 3px solid var(--banner-bg); border-radius: var(--radius);
            padding: 20px; box-shadow: var(--shadow); max-width: 320px;
        }
        .profile-links-label {
            font-family: var(--ff-mono); font-size: 11px; color: var(--text-muted);
            letter-spacing: 0.1em; text-transform: uppercase;
            border-bottom: 1px solid var(--border); padding-bottom: 10px; margin-bottom: 10px;
        }
        .profile-link {
            font-size: 14px; color: var(--text-muted); text-decoration: none;
            display: flex; align-items: center; gap: 10px;
            padding: 8px 6px; border-radius: var(--radius);
            transition: background 0.15s, color 0.15s;
        }
        .profile-link:hover { background: var(--bg-soft); color: var(--text); text-decoration: none; }
        .profile-link svg { flex-shrink: 0; }

        /* ── About layout (bio + links) ── */
        .about-layout {
            display: grid; grid-template-columns: 1fr 300px; gap: 40px; align-items: start;
        }

        /* ── Experience / Education ── */
        .exp-list { display: flex; flex-direction: column; gap: 32px; }
        .exp-item {
            border-left: 3px solid var(--border2); padding-left: 24px; position: relative;
        }
        .exp-item::before {
            content: ''; position: absolute; left: -6px; top: 8px;
            width: 10px; height: 10px; border-radius: 50%;
            background: var(--banner-bg); border: 2px solid #fff;
        }
        .exp-header {
            display: flex; justify-content: space-between; align-items: baseline;
            flex-wrap: wrap; gap: 6px; margin-bottom: 4px;
        }
        .exp-org { font-family: var(--ff-display); font-weight: 600; font-size: 17px; color: var(--text); }
        .exp-date { font-family: var(--ff-mono); font-size: 12px; color: var(--gold); white-space: nowrap; }
        .exp-role { font-size: 14px; color: var(--banner-bg); font-weight: 600; margin-bottom: 4px; }
        .exp-loc { font-family: var(--ff-mono); font-size: 12px; color: var(--text-muted); margin-bottom: 10px; }
        .exp-bullets { list-style: none; padding: 0; display: flex; flex-direction: column; gap: 5px; }
        .exp-bullets li {
            font-size: 14px; color: #444; padding-left: 16px;
            position: relative; line-height: 1.65;
        }
        .exp-bullets li::before {
            content: '›'; position: absolute; left: 0; color: var(--banner-bg); font-weight: 700;
        }

        /* ── Awards ── */
        .awards-list { display: flex; flex-direction: column; gap: 20px; margin-top: 10px; }
        .award-item {
            background: linear-gradient(135deg, #fdf5e8 0%, var(--card-bg) 65%);
            border: 1px solid rgba(212,168,80,0.35); border-left: 4px solid var(--gold);
            border-radius: var(--radius); padding: 18px 22px; box-shadow: var(--shadow);
        }
        .award-item-title {
            font-family: var(--ff-display); font-weight: 600; font-size: 16px;
            color: var(--gold); margin-bottom: 4px;
        }
        .award-item-meta {
            font-family: var(--ff-mono); font-size: 11px; color: var(--text-muted); margin-bottom: 10px;
        }
        .award-item-bullets { list-style: none; padding: 0; }
        .award-item-bullets li {
            font-size: 14px; color: #444; padding-left: 16px;
            position: relative; line-height: 1.65;
        }
        .award-item-bullets li::before {
            content: '›'; position: absolute; left: 0; color: var(--gold); font-weight: 700;
        }

        /* ── Certifications ── */
        .cert-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 14px; margin-top: 10px;
        }
        .cert-card {
            background: var(--card-bg); border: 1px solid var(--border);
            border-radius: var(--radius); padding: 16px 18px; box-shadow: var(--shadow);
        }
        .cert-org {
            font-family: var(--ff-mono); font-size: 11px; color: var(--gold);
            letter-spacing: 0.07em; text-transform: uppercase; margin-bottom: 6px;
        }
        .cert-name { font-size: 14px; color: var(--text); font-weight: 600; line-height: 1.4; margin-bottom: 4px; }
        .cert-meta { font-family: var(--ff-mono); font-size: 11px; color: var(--text-muted); }

        /* ── Grants ── */
        .grant-item {
            background: var(--card-bg); border: 1px solid var(--border);
            border-left: 4px solid var(--banner-bg); border-radius: var(--radius);
            padding: 18px 22px; margin-bottom: 16px; box-shadow: var(--shadow);
        }
        .grant-title {
            font-family: var(--ff-display); font-weight: 600; font-size: 16px;
            color: var(--text); margin-bottom: 6px;
        }
        .grant-meta {
            font-family: var(--ff-mono); font-size: 11px; color: var(--gold); margin-bottom: 10px;
        }
        .grant-bullets { list-style: none; padding: 0; }
        .grant-bullets li {
            font-size: 14px; color: #444; padding-left: 16px;
            position: relative; line-height: 1.65;
        }
        .grant-bullets li::before {
            content: '›'; position: absolute; left: 0; color: var(--banner-bg); font-weight: 700;
        }

        /* ── News ── */
        .news-list { display: flex; flex-direction: column; gap: 0; }
        .news-item {
            display: flex; gap: 16px; padding: 14px 0;
            border-bottom: 1px solid var(--border); align-items: flex-start;
        }
        .news-item:last-child { border-bottom: none; }
        .news-date {
            flex: 0 0 80px; font-size: 12px; font-weight: 700;
            text-transform: uppercase; letter-spacing: 0.06em; color: var(--banner-bg);
            background: rgba(155,46,43,0.07); border-radius: 4px;
            padding: 3px 8px; text-align: center; line-height: 1.4; margin-top: 2px;
        }
        .news-text { font-size: 15px; line-height: 1.6; flex: 1; }

        /* ── Newspaper Coverage ── */
        .nc-subheading {
            margin-top: 2.4rem; margin-bottom: 1.2rem;
            font-family: var(--ff-display); font-size: 17px; font-weight: 600;
            color: var(--banner-bg); display: flex; align-items: center; gap: 9px;
            border-left: 3px solid var(--banner-bg); padding-left: 12px;
            scroll-margin-top: 110px;
        }
        .nc-grid {
            display: grid; grid-template-columns: repeat(3, 1fr);
            gap: 16px; margin-bottom: 4px;
        }
        .nc-card {
            background: var(--card-bg); border: 1px solid var(--border);
            border-top: 3px solid var(--banner-bg); border-radius: var(--radius);
            display: flex; flex-direction: column; box-shadow: var(--shadow);
            transition: box-shadow 0.2s, transform 0.2s;
        }
        .nc-card:hover { box-shadow: 0 6px 24px rgba(155,46,43,0.13); transform: translateY(-2px); }
        .nc-thumb {
            display: flex; align-items: center; gap: 8px; padding: 10px 14px;
            background: rgba(155,46,43,0.05); border-bottom: 1px solid var(--border);
        }
        .nc-thumb img { width: 18px; height: 18px; border-radius: 3px; object-fit: contain; flex-shrink: 0; }
        .nc-source {
            font-size: 11px; font-weight: 700; color: var(--banner-bg);
            text-transform: uppercase; letter-spacing: 0.07em;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .nc-body { padding: 12px 14px 14px; flex-grow: 1; display: flex; flex-direction: column; }
        .nc-title-en { font-size: 13px; font-weight: 700; color: var(--text); line-height: 1.4; margin-bottom: 4px; }
        .nc-title-bn { font-size: 12px; color: var(--text-muted); line-height: 1.5; margin-bottom: 10px; flex-grow: 1; }
        .nc-read {
            font-size: 12px; font-weight: 600; color: var(--banner-bg); text-decoration: none;
            display: inline-flex; align-items: center; gap: 4px; transition: gap 0.2s; margin-top: auto;
        }
        .nc-read:hover { gap: 7px; text-decoration: none; }
        .nc-read svg { width: 11px; height: 11px; }
        .nc-pagination {
            display: flex; align-items: center; justify-content: center;
            gap: 5px; margin-top: 18px; flex-wrap: wrap;
        }
        .nc-pg-btn {
            min-width: 32px; height: 32px; padding: 0 9px;
            border: 1px solid var(--border); background: var(--card-bg);
            border-radius: var(--radius); font-size: 13px; font-weight: 600;
            color: var(--text-muted); cursor: pointer; display: inline-flex;
            align-items: center; justify-content: center; gap: 4px;
            transition: background 0.2s, color 0.2s, border-color 0.2s;
            font-family: var(--ff-body);
        }
        .nc-pg-btn:hover:not(:disabled) { background: var(--banner-bg); color: #fff; border-color: var(--banner-bg); }
        .nc-pg-btn.nc-active { background: var(--banner-bg); color: #fff; border-color: var(--banner-bg); }
        .nc-pg-btn:disabled { opacity: 0.38; cursor: default; }

        /* ── Teaching ── */
        .teaching-filter { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 24px; }
        .tf-btn {
            font-family: var(--ff-mono); font-size: 11px; letter-spacing: 0.06em;
            text-transform: uppercase; padding: 5px 14px; border-radius: 3px;
            border: 1px solid var(--border2); background: var(--card-bg);
            color: var(--text-muted); cursor: pointer; transition: all 0.15s;
        }
        .tf-btn:hover { border-color: var(--banner-bg); color: var(--banner-bg); }
        .tf-btn.tf-active { background: var(--banner-bg); color: #fff; border-color: var(--banner-bg); }

        .course-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 16px; }
        .course-card {
            background: var(--card-bg); border: 1px solid var(--border);
            border-radius: var(--radius); padding: 18px 20px;
            display: flex; flex-direction: column; gap: 8px;
            box-shadow: var(--shadow); transition: border-color 0.2s, box-shadow 0.2s;
        }
        .course-card:hover { border-color: var(--banner-bg); box-shadow: 0 4px 20px rgba(155,46,43,0.10); }
        .course-card-head { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; }
        .course-name { font-family: var(--ff-display); font-weight: 600; font-size: 15px; color: var(--text); line-height: 1.35; }
        .course-code {
            font-family: var(--ff-mono); font-size: 10px; color: var(--banner-bg);
            background: var(--bg-soft); border: 1px solid var(--border2);
            padding: 3px 8px; border-radius: 3px; white-space: nowrap; flex-shrink: 0;
        }
        .course-inst {
            font-family: var(--ff-mono); font-size: 11px; color: var(--text-muted);
            letter-spacing: 0.04em; display: flex; align-items: center; gap: 6px;
        }
        .course-inst-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
        .dot-mbstu  { background: var(--banner-bg); }
        .dot-qut    { background: #003087; }
        .dot-rmit   { background: #E8000D; }
        .dot-monash { background: #006CAB; }
        .dot-diu    { background: #009933; }
        .course-desc {
            font-size: 13px; color: #555; line-height: 1.65;
            border-top: 1px solid var(--border); padding-top: 8px;
        }

        /* ── Memberships ── */
        .membership-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 18px; margin-top: 10px;
        }
        .membership-card {
            background: var(--card-bg); border: 1px solid var(--border2);
            border-top: 3px solid var(--gold); border-radius: var(--radius);
            padding: 18px 20px; display: flex; flex-direction: column; gap: 6px;
            box-shadow: var(--shadow);
        }
        .membership-org { font-family: var(--ff-display); font-weight: 600; font-size: 15px; color: var(--text); line-height: 1.35; }
        .membership-grade { font-family: var(--ff-mono); font-size: 11px; color: var(--gold); letter-spacing: 0.06em; text-transform: uppercase; }
        .membership-rows { display: flex; flex-direction: column; gap: 4px; margin-top: 4px; }
        .membership-row { display: flex; gap: 10px; font-size: 13px; }
        .membership-label { font-family: var(--ff-mono); font-size: 11px; color: var(--text-muted); min-width: 80px; padding-top: 1px; }
        .membership-val { color: #444; line-height: 1.5; }
        .membership-status-active {
            display: inline-flex; align-items: center; gap: 5px;
            font-family: var(--ff-mono); font-size: 11px; color: #1a7a3e;
        }
        .membership-status-active::before {
            content: ''; width: 7px; height: 7px; border-radius: 50%; background: #2eaa5e; flex-shrink: 0;
        }

        /* ── LinkedIn ── */
        .linkedin-wrap { display: flex; justify-content: center; }
        .linkedin-wrap iframe { border-radius: var(--radius); max-width: 100%; }

        /* ── Publications ── */
        .pub-tabs {
            display: flex; gap: 0; margin-bottom: 28px;
            border-bottom: 2px solid var(--border);
        }
        .pub-tab {
            font-family: var(--ff-body); font-size: 14px; font-weight: 600; letter-spacing: 0.02em;
            padding: 10px 22px; cursor: pointer; color: var(--text-muted);
            border-bottom: 3px solid transparent; margin-bottom: -2px;
            transition: all 0.2s; background: none;
            border-top: none; border-left: none; border-right: none;
        }
        .pub-tab.active { color: var(--banner-bg); border-bottom-color: var(--banner-bg); }
        .pub-tab:hover:not(.active) { color: var(--text); }

        .pub-pane { display: none; }
        .pub-pane.active { display: block; }

        .pub-year-block { margin-bottom: 36px; }
        .pub-year-heading {
            font-family: var(--ff-display); font-size: 20px; font-weight: 600;
            color: var(--banner-bg); border-bottom: 2px solid rgba(155,46,43,0.25);
            padding-bottom: 6px; margin-bottom: 16px;
        }
        .pub-list-items { display: flex; flex-direction: column; gap: 0; }
        .pub-item {
            display: flex; gap: 14px; padding: 14px 0;
            border-bottom: 1px dashed var(--border); align-items: flex-start;
        }
        .pub-item:last-child { border-bottom: none; }
        .pub-bullet {
            flex: 0 0 auto; width: 8px; height: 8px; border-radius: 50%;
            background: var(--banner-bg); margin-top: 8px;
        }
        .pub-body { flex: 1; }
        .pub-title { font-size: 15px; font-weight: 600; line-height: 1.5; color: var(--text); margin-bottom: 4px; }
        .pub-title a { color: var(--banner-bg); }
        .pub-title a:hover { color: var(--bar-bg); }
        .pub-authors { font-size: 14px; color: var(--text-muted); margin-bottom: 2px; }
        .pub-authors strong { color: var(--text); }
        .pub-venue { font-size: 13px; font-weight: 600; color: var(--banner-bg); font-style: italic; }
        .pub-tag {
            display: inline-block; font-family: var(--ff-mono); font-size: 10px;
            background: var(--bg-soft); border: 1px solid var(--border2);
            color: var(--banner-bg); padding: 2px 7px; border-radius: 3px;
            margin-left: 7px; letter-spacing: 0.04em; vertical-align: middle; font-style: normal;
        }

        /* ── Contact ── */
        .contact-layout {
            display: grid; grid-template-columns: 1fr 1.3fr; gap: 40px; align-items: start;
        }
        .contact-info p { color: var(--text-muted); margin-bottom: 22px; }
        .contact-detail { margin-bottom: 18px; }
        .contact-detail-label {
            display: block; font-family: var(--ff-mono); font-size: 11px;
            color: var(--gold); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 4px;
        }
        .contact-detail a { color: var(--text); font-weight: 600; }
        .contact-detail a:hover { color: var(--banner-bg); }
        .contact-form {
            background: var(--card-bg); border: 1px solid var(--border);
            border-top: 3px solid var(--banner-bg); border-radius: var(--radius);
            padding: 28px; box-shadow: var(--shadow);
        }
        .form-row { margin-bottom: 16px; display: flex; flex-direction: column; gap: 6px; }
        .form-row label {
            font-size: 13px; font-weight: 600; color: var(--text);
        }
        .form-row input, .form-row textarea {
            font-family: var(--ff-body); font-size: 14px; color: var(--text);
            border: 1px solid var(--border2); border-radius: var(--radius);
            padding: 10px 12px; background: #fff; transition: border-color 0.2s, box-shadow 0.2s;
            resize: vertical;
        }
        .form-row input:focus, .form-row textarea:focus {
            outline: none; border-color: var(--banner-bg);
            box-shadow: 0 0 0 3px rgba(155,46,43,0.12);
        }
        .contact-submit {
            border: none; cursor: pointer; font-family: var(--ff-body); margin-top: 4px;
        }
        .contact-form-note {
            margin: 12px 0 0; font-size: 13px; color: var(--text-muted); min-height: 18px;
        }
        .contact-form-note.success { color: #1d7a3a; font-weight: 600; }
        .contact-form-note.error { color: var(--banner-bg); font-weight: 600; }
        @media (max-width: 800px) {
            .contact-layout { grid-template-columns: 1fr; }
        }

        /* ════════════════════════════════════════
           FOOTER
        ════════════════════════════════════════ */
        .footer {
            background: var(--bar-bg); color: rgba(255,255,255,0.70);
            padding: 28px 0; font-size: 13.5px;
        }
        .footer-grid {
            display: flex; justify-content: space-between; align-items: center;
            gap: 20px; flex-wrap: wrap; margin-bottom: 12px;
        }
        .footer-meta { color: rgba(255,255,255,0.55); }
        .footer-links { display: flex; gap: 16px; }
        .footer-links a { color: rgba(255,255,255,0.70); font-size: 13px; }
        .footer-links a:hover { color: #fff; }
        .footer-note {
            border-top: 1px solid rgba(255,255,255,0.12); padding-top: 12px;
            font-size: 12.5px; color: rgba(255,255,255,0.45);
        }

        /* ════════════════════════════════════════
           RESPONSIVE
        ════════════════════════════════════════ */
        @media (max-width: 900px) {
            .about-layout { grid-template-columns: 1fr; }
            .profile-links-card { max-width: 100%; }
        }
        @media (max-width: 720px) {
            .hero-content { flex-direction: column-reverse; gap: 28px; }
            .hero-image { display: flex; justify-content: center; width: 100%; }
            .profile-card { width: 160px; height: 180px; }
            .mobile-menu-toggle { display: flex; }
            .nav-menu {
                display: none; position: absolute; top: 102px; left: 0; right: 0;
                background: var(--bar-bg); flex-direction: column;
                padding: 12px 0; gap: 0; z-index: 200;
                box-shadow: 0 8px 24px rgba(0,0,0,0.25);
            }
            .nav-menu.open { display: flex; }
            .nav-menu a { padding: 10px 24px; border-radius: 0; border-bottom: 1px solid rgba(255,255,255,0.06); }
            .nav-menu > li { width: 100%; }
            .dropdown-toggle { width: 100%; justify-content: space-between; }
            .dropdown-menu {
                position: static; opacity: 1; visibility: visible; transform: none;
                display: none; box-shadow: none; border: none; border-radius: 0;
                background: rgba(0,0,0,0.18); padding: 0; min-width: 0;
            }
            .nav-menu > li.has-dropdown.open .dropdown-menu { display: block; }
            .dropdown-menu a { padding: 10px 36px; border-radius: 0; }
            .brand-unit { font-size: 11px; }
            .key-focus-grid { grid-template-columns: 1fr; }
            .nc-grid { grid-template-columns: 1fr; }
            .news-date { flex: 0 0 64px; font-size: 11px; }
            .exp-header { flex-direction: column; gap: 2px; }
        }
